<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BOM Radar Card Preview</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #0f172a;
        color: #e5e7eb;
        font-family: system-ui, sans-serif;
      }
      main {
        width: min(920px, calc(100vw - 32px));
        margin: 24px auto;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 18px;
        font-weight: 700;
      }
      #status {
        min-height: 20px;
        margin-bottom: 12px;
        color: #cbd5e1;
        font-size: 13px;
      }
      bom-radar-card {
        display: block;
      }
      ha-card {
        display: block;
        border-radius: 12px;
        overflow: hidden;
        background: #111827;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>BOM Radar Card Preview</h1>
      <div id="status">Loading live card preview...</div>
      <div id="preview"></div>
    </main>

    <script type="module" src="../dist/bom-radar-card.js"></script>
    <script type="module">
      const status = document.getElementById('status');
      const preview = document.getElementById('preview');

      try {
        await customElements.whenDefined('bom-radar-card');
        const card = document.createElement('bom-radar-card');
        card.setConfig({
          type: 'custom:bom-radar-card',
          layer: 'reflectivity',
          zoom_level: 9,
          map_height: 460,
          basemap_provider: 'carto',
          basemap_style: 'dark',
          dark_basemap: true,
          frame_delay: 500,
          restart_delay: 1500,
          frame_count: 9,
          radar_opacity: 0.7,
          chrome_opacity: 1,
          show_marker: true,
          show_zoom: true,
          show_recenter: true,
          show_layer_switcher: true,
          show_playback: true,
          show_legend: true,
          square_style: false,
          show_layer_label: false,
          show_attribution: true,
          allow_overzoom: true,
          center_latitude: -27.55425269410533,
          center_longitude: 153.08397843081823,
        });
        card.hass = {
          config: {
            latitude: -27.55425269410533,
            longitude: 153.08397843081823,
          },
        };
        preview.appendChild(card);
        status.textContent = 'Live preview using real Leaflet, CARTO basemap tiles, and BOM tile URLs.';
      } catch (err) {
        status.textContent = `Preview failed: ${err?.message || err}`;
        throw err;
      }
    </script>
  </body>
</html>
