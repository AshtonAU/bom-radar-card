<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BOM Radar Card Live Harness</title>
    <style>
      body {
        margin: 24px;
        background: #0f172a;
        color: #e5e7eb;
        font-family: system-ui, sans-serif;
      }
      #status {
        margin-bottom: 12px;
        font-weight: 700;
      }
      #results {
        white-space: pre-wrap;
        background: #020617;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 12px;
      }
      #root {
        width: min(900px, calc(100vw - 48px));
        margin-top: 16px;
      }
      .view {
        width: 100%;
      }
      .hidden-view {
        display: none;
      }
      .narrow-view {
        width: min(390px, calc(100vw - 48px));
      }
    </style>
  </head>
  <body>
    <div id="status">Running live checks</div>
    <pre id="results"></pre>
    <main id="root"></main>

    <script type="module" src="../dist/bom-radar-card.js"></script>
    <script type="module">
      const status = document.getElementById('status');
      const results = document.getElementById('results');
      const root = document.getElementById('root');

      const config = {
        type: 'custom:bom-radar-card',
        layer: 'reflectivity',
        zoom_level: 9,
        map_height: 460,
        basemap_provider: 'carto',
        basemap_style: 'dark',
        dark_basemap: true,
        frame_delay: 500,
        restart_delay: 1500,
        frame_count: 9,
        radar_opacity: 0.7,
        chrome_opacity: 1,
        show_marker: true,
        show_zoom: true,
        show_recenter: true,
        show_layer_switcher: true,
        show_playback: true,
        show_legend: true,
        square_style: false,
        show_layer_label: false,
        show_attribution: true,
        allow_overzoom: true,
        center_latitude: -27.55425269410533,
        center_longitude: 153.08397843081823,
      };
      const hass = {
        config: {
          latitude: -27.55425269410533,
          longitude: 153.08397843081823,
        },
      };

      const output = [];
      const assert = (condition, label) => {
        if (!condition) throw new Error(label);
        output.push(`PASS ${label}`);
        results.textContent = output.join('\n');
      };
      const waitFor = async (predicate, label, timeoutMs = 12000) => {
        const startedAt = performance.now();
        while (performance.now() - startedAt < timeoutMs) {
          if (predicate()) return;
          await new Promise((resolve) => setTimeout(resolve, 100));
        }
        throw new Error(`Timed out waiting for ${label}`);
      };
      const layerCases = [
        { key: 'reflectivity', mode: 'time', minFrames: 9 },
        { key: 'rain_rate', mode: 'time', minFrames: 9 },
        { key: 'accumulation_1hr', mode: 'time', minFrames: 9 },
        { key: 'accumulation_24hr', mode: 'date', minFrames: 7 },
        { key: 'forecast_rain_50pct_3hr', mode: 'forecastTime', minFrames: 9 },
        { key: 'forecast_rain_50pct_daily', mode: 'date', minFrames: 7 },
        { key: 'wind_speed_kmh', mode: 'forecastTime', minFrames: 9 },
        { key: 'wave_total_height', mode: 'forecastTime', minFrames: 9 },
        { key: 'air_temperature', mode: 'forecastTime', minFrames: 9 },
        { key: 'temperature_max_daily', mode: 'date', minFrames: 7 },
        { key: 'relative_humidity', mode: 'forecastTime', minFrames: 9 },
        { key: 'uv_index', mode: 'forecastTime', minFrames: 9 },
        { key: 'thunderstorms', mode: 'forecastTime', minFrames: 9 },
        { key: 'fog', mode: 'forecastTime', minFrames: 9 },
      ];

      const createCard = (overrides = {}) => {
        const card = document.createElement('bom-radar-card');
        card.setConfig({ ...config, ...overrides });
        card.hass = hass;
        return card;
      };
      const getState = (card) => {
        const rootNode = card.shadowRoot;
        const map = rootNode.getElementById('map');
        const tiles = Array.from(rootNode.querySelectorAll('.leaflet-tile'));
        const loadedTiles = tiles.filter((tile) => tile.classList.contains('leaflet-tile-loaded'));
        const visibleLoadedTiles = loadedTiles.filter((tile) => tile.naturalWidth > 1 && tile.naturalHeight > 1);
        const bomTiles = tiles.filter((tile) => tile.src.includes('api.bom.gov.au'));
        const loadedBomTiles = bomTiles.filter((tile) => tile.classList.contains('leaflet-tile-loaded'));
        return {
          map,
          mapRect: map.getBoundingClientRect(),
          loading: rootNode.getElementById('loading'),
          timeline: rootNode.getElementById('timeline'),
          timeLabel: rootNode.getElementById('time-label'),
          tiles,
          loadedTiles,
          visibleLoadedTiles,
          bomTiles,
          loadedBomTiles,
          attribution: rootNode.querySelector('.leaflet-control-attribution'),
          marker: rootNode.querySelector('.marker-dot'),
          layerButton: rootNode.querySelector('.bom-layer-button'),
          recenterButton: rootNode.querySelector('.bom-recenter-button'),
        };
      };
      const expectedFrameCount = (card) => card._config.layer.includes('daily') || card._config.layer === 'accumulation_24hr'
        ? Math.min(7, card._config.frame_count)
        : card._config.frame_count;
      const waitForReadyCard = async (card, label) => {
        await waitFor(() => {
          const state = getState(card);
          const frameCount = expectedFrameCount(card);
          return card._timestamps?.length === frameCount &&
            state.timeline?.children.length === frameCount &&
            !state.loading &&
            state.mapRect.width > 0 &&
            state.mapRect.height >= 450 &&
            state.visibleLoadedTiles.length > 0 &&
            state.loadedBomTiles.length > 0;
        }, label);
      };
      const checkTimeLabel = (value, mode, label) => {
        if (mode === 'date') {
          assert(/^[A-Z][a-z]{2},? \d{1,2} [A-Z][a-z]{2}$/.test(value), `${label} date label format`);
          return;
        }
        if (mode === 'forecastTime') {
          assert(/^[A-Z][a-z]{2},? \d{2}:\d{2}$/.test(value), `${label} forecast time label format`);
          return;
        }
        assert(/^\d{2}:\d{2}$/.test(value), `${label} observed time label format`);
      };
      const checkLayer = async (card, layerCase) => {
        await card._setLayer(layerCase.key);
        await waitFor(() => {
          const state = getState(card);
          return card._config.layer === layerCase.key &&
            card._timestamps?.length >= layerCase.minFrames &&
            state.timeline?.children.length >= layerCase.minFrames &&
            state.loadedBomTiles.length > 0 &&
            state.timeLabel.textContent !== '--:--';
        }, `layer ${layerCase.key}`);
        const state = getState(card);
        assert(card._config.layer === layerCase.key, `${layerCase.key} selected`);
        assert(state.timeline.children.length >= layerCase.minFrames, `${layerCase.key} timeline rebuilt`);
        assert(state.loadedBomTiles.length > 0, `${layerCase.key} BOM tiles requested`);
        checkTimeLabel(state.timeLabel.textContent, layerCase.mode, layerCase.key);
      };

      try {
        await customElements.whenDefined('bom-radar-card');

        const card = createCard();
        assert(card._initialized === false, 'detached config+hass does not initialize');

        root.appendChild(card);
        await waitForReadyCard(card, 'first live render');
        let state = getState(card);
        assert(card._map, 'Leaflet map exists after first attach');
        assert(state.timeline.children.length === 9, 'timeline has 9 frames after first attach');
        assert(state.timeLabel.textContent !== '--:--', 'time label updated after first attach');
        checkTimeLabel(state.timeLabel.textContent, 'time', 'initial reflectivity');
        assert(state.visibleLoadedTiles.length > 0, 'real map tiles loaded after first attach');
        assert(state.loadedBomTiles.length > 0, 'BOM overlay tiles requested after first attach');
        assert(Boolean(state.attribution), 'attribution rendered');
        assert(Boolean(state.marker), 'home marker rendered');
        assert(Boolean(state.layerButton), 'layer switcher rendered');
        assert(Boolean(state.recenterButton), 'recenter control rendered');

        const homeCenter = card._map.getCenter();
        const firstZoom = card._map.getZoom();
        card._map.setZoom(10);
        await waitFor(() => card._map.getZoom() === 10 && card._pendingZoomRebuild === false, 'zoom in to overzoom level');
        assert(card._map.getZoom() === 10, 'zoom in reaches configured overzoom max');
        card._map.setZoom(8);
        await waitFor(() => card._map.getZoom() === 8 && card._pendingZoomRebuild === false, 'zoom out to native level');
        assert(card._map.getZoom() === 8, 'zoom out reaches native level');
        card._map.setZoom(firstZoom);
        card._map.panTo([homeCenter.lat + 1, homeCenter.lng + 1], { animate: false });
        state.recenterButton.click();
        await waitFor(() => {
          const center = card._map.getCenter();
          return Math.abs(center.lat - hass.config.latitude) < 0.05 &&
            Math.abs(center.lng - hass.config.longitude) < 0.05;
        }, 'recenter control returns to home');
        assert(true, 'recenter returns to home coordinates');

        const firstMap = card._map;
        root.removeChild(card);
        assert(card._map === null, 'map cleaned up after detach');
        assert(card._initialized === false, 'card marked uninitialized after detach');

        root.appendChild(card);
        await waitForReadyCard(card, 'live render after reconnect');
        state = getState(card);
        assert(card._map && card._map !== firstMap, 'new Leaflet map created after reconnect');
        assert(state.timeline.children.length === 9, 'timeline has 9 frames after reconnect');
        assert(state.visibleLoadedTiles.length > 0, 'real map tiles loaded after reconnect');
        assert(state.loadedBomTiles.length > 0, 'BOM overlay tiles requested after reconnect');

        for (const layerCase of layerCases) {
          await checkLayer(card, layerCase);
        }

        root.removeChild(card);

        const hiddenView = document.createElement('section');
        hiddenView.className = 'view hidden-view';
        root.appendChild(hiddenView);
        const hiddenCard = createCard({ layer: 'reflectivity' });
        hiddenView.appendChild(hiddenCard);
        await waitFor(() => hiddenCard._initialized === true, 'hidden view starts initialization');
        hiddenView.classList.remove('hidden-view');
        await waitForReadyCard(hiddenCard, 'hidden view becomes visible');
        assert(getState(hiddenCard).loadedBomTiles.length > 0, 'hidden-to-visible view loads BOM tiles');
        root.removeChild(hiddenView);

        const narrowView = document.createElement('section');
        narrowView.className = 'view narrow-view';
        root.appendChild(narrowView);
        const narrowCard = createCard({ layer: 'reflectivity', map_height: 360 });
        narrowView.appendChild(narrowCard);
        await waitFor(() => {
          const narrowState = getState(narrowCard);
          return narrowCard._timestamps?.length === 9 &&
            narrowState.timeline?.children.length === 9 &&
            !narrowState.loading &&
            narrowState.mapRect.width > 0 &&
            narrowState.mapRect.width <= 390 &&
            narrowState.loadedBomTiles.length > 0;
        }, 'narrow mobile-width render');
        assert(getState(narrowCard).mapRect.width <= 390, 'narrow view respects mobile-width layout');
        root.removeChild(narrowView);

        status.textContent = 'PASS';
      } catch (err) {
        status.textContent = 'FAIL';
        results.textContent = `${output.join('\n')}\n${err?.stack || err}`;
        throw err;
      }
    </script>
  </body>
</html>
